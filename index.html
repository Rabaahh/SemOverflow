<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SemOverflow – Doubt Board</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
  <style>
    :root{--bg:#f0f2f8;--card:#fff;--border:#e2e5f0;--primary:#2563eb;--pri-lite:#eff4ff;--pri-dark:#1e40af;--accent:#f59e0b;--text:#111827;--muted:#6b7280;--danger:#dc2626;--success:#059669;--radius:10px;--shadow:0 2px 12px rgba(37,99,235,.08)}
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Plus Jakarta Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
    .hidden{display:none!important}

    /* ── ADMIN CONTROLS ────────────────────────────────────────────────────────
       To show edit/delete buttons: change `none` → `unset` in the line below.
       To hide them again:          change `unset` → `none`.
       Nothing else needs touching.
    ── */
    .admin-only{display:none!important}

    /* Navbar */
    .navbar{background:var(--pri-dark);height:58px;display:flex;align-items:center;padding:0 20px;gap:12px;position:sticky;top:0;z-index:200;box-shadow:0 2px 10px rgba(0,0,0,.25)}
    .nav-brand{flex:1;color:#fff;font-weight:800;font-size:1.2rem;letter-spacing:-.5px}
    .nav-brand span{color:#fbbf24}
    .btn-ask{background:var(--accent);color:#1c1400;border:none;border-radius:8px;font-weight:700;font-size:.82rem;padding:8px 16px;cursor:pointer;display:flex;align-items:center;gap:6px;transition:background .15s,transform .1s;font-family:inherit;white-space:nowrap}
    .btn-ask:hover{background:#e08b00;transform:translateY(-1px)}

    /* Subject bar */
    .subject-bar{background:var(--card);border-bottom:2px solid var(--border);display:flex;gap:2px;padding:0 12px;overflow-x:auto;scrollbar-width:none;position:sticky;top:58px;z-index:100}
    .subject-bar::-webkit-scrollbar{display:none}
    .sub-tab{padding:13px 15px;font-size:.82rem;font-weight:600;color:var(--muted);border-bottom:3px solid transparent;white-space:nowrap;cursor:pointer;transition:color .15s,border-color .15s;user-select:none}
    .sub-tab:hover{color:var(--primary)}
    .sub-tab.active{color:var(--primary);border-bottom-color:var(--primary)}

    /* Badges */
    .badge{display:inline-flex;align-items:center;gap:4px;font-size:.72rem;font-weight:700;padding:3px 9px;border-radius:20px}
    .s-All{background:#f3f4f6;color:#374151}
    .s-Maths{background:#dbeafe;color:#1d4ed8}
    .s-COA{background:#fce7f3;color:#be185d}
    .s-DBMS{background:#d1fae5;color:#065f46}
    .s-OS{background:#fef3c7;color:#92400e}
    .s-SE{background:#ede9fe;color:#5b21b6}
    .s-SC{background:#fee2e2;color:#991b1b}
    .s-Ethics{background:#e0f2fe;color:#075985}
    .s-General{background:#f0fdf4;color:#166534}
    .badge-ans{background:var(--pri-lite);color:var(--primary)}
    .badge-voice{background:#fef3c7;color:#92400e}

    /* Layout */
    .wrap{max-width:820px;margin:0 auto;padding:24px 16px 60px}
    .section{display:none}
    .section.active{display:block}

    /* Question cards */
    .q-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:16px 18px;margin-bottom:10px;cursor:pointer;transition:box-shadow .15s,border-color .15s,transform .1s}
    .q-card:hover{box-shadow:var(--shadow);border-color:#bfdbfe;transform:translateY(-1px)}
    .q-card-title{font-size:.97rem;font-weight:700;color:var(--primary);margin-bottom:5px}
    .q-card-desc{font-size:.82rem;color:var(--muted);display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;margin-bottom:8px}
    .q-card-meta{display:flex;gap:8px;align-items:center;flex-wrap:wrap}

    /* Feed header */
    .feed-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
    .feed-hdr h5{font-weight:800;font-size:1rem}

    /* Detail boxes */
    .detail-box{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:22px;margin-bottom:18px}
    .detail-title{font-size:1.2rem;font-weight:800;margin-bottom:6px;line-height:1.3}
    .detail-body{font-size:.9rem;line-height:1.7;white-space:pre-wrap}
    .answer-block{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:18px;margin-bottom:12px}
    .answer-body{font-size:.9rem;line-height:1.7;white-space:pre-wrap}

    /* Action row */
    .action-row{display:flex;gap:4px;flex-wrap:wrap;margin-top:10px}
    .act-btn{background:none;border:none;font-size:.75rem;font-weight:600;color:var(--muted);cursor:pointer;padding:4px 8px;border-radius:6px;display:inline-flex;align-items:center;gap:4px;transition:background .12s,color .12s;font-family:inherit}
    .act-btn:hover{background:#f3f4f6;color:var(--text)}
    .act-btn.danger:hover{background:#fee2e2;color:var(--danger)}
    .act-btn.primary{color:var(--primary)}
    .act-btn.primary:hover{background:var(--pri-lite)}

    /* Comments */
    .comment-section{margin-top:12px;padding-top:10px;border-top:1px solid var(--border)}
    .comment-list{margin-top:6px}
    .comment-item{display:flex;gap:8px;margin-bottom:8px}
    .comment-avatar{width:26px;height:26px;border-radius:50%;background:linear-gradient(135deg,#6366f1,#8b5cf6);display:flex;align-items:center;justify-content:center;color:#fff;font-size:.65rem;font-weight:700;flex-shrink:0;margin-top:1px}
    .comment-bubble{flex:1;min-width:0}
    .comment-content{background:#f8f9fc;border:1px solid var(--border);border-radius:0 8px 8px 8px;padding:7px 11px;font-size:.82rem;line-height:1.5}
    .comment-content strong{font-size:.78rem}
    .comment-meta{font-size:.7rem;color:var(--muted);margin-top:3px;display:flex;gap:10px;flex-wrap:wrap;align-items:center}
    .inline-btn{background:none;border:none;font-size:.7rem;font-weight:600;color:var(--muted);cursor:pointer;padding:0;font-family:inherit}
    .inline-btn:hover{color:var(--primary);text-decoration:underline}
    .inline-btn.danger:hover{color:var(--danger)}
    .reply-thread{margin-left:34px;border-left:2px solid var(--border);padding-left:10px;margin-top:4px}
    .comment-input-row{display:flex;gap:6px;margin-top:6px;background:#f8f9fc;border:1px solid var(--border);border-radius:8px;padding:6px 8px;align-items:center}
    .comment-input-row input{flex:1;border:none;background:transparent;outline:none;font-size:.82rem;font-family:inherit;min-width:0}
    .comment-input-row .name-in{max-width:120px;border-right:1px solid var(--border);padding-right:8px;flex-shrink:0}
    .edited-tag{font-size:.68rem;color:var(--muted);font-style:italic}

    /* Forms */
    .form-box{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:24px;margin-bottom:20px}
    .form-title{font-size:1rem;font-weight:800;margin-bottom:18px}
    .flabel{font-size:.8rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;display:block;margin-bottom:6px}
    .flabel-sub{text-transform:none;font-weight:400;color:var(--muted)}
    .finput,.ftextarea{width:100%;border:1.5px solid var(--border);border-radius:8px;padding:9px 12px;font-size:.88rem;font-family:inherit;outline:none;transition:border-color .15s;background:#fff;color:var(--text)}
    .finput:focus,.ftextarea:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(37,99,235,.08)}
    .ftextarea{resize:vertical}
    .fgroup{margin-bottom:16px}
    .sub-picker{display:flex;flex-wrap:wrap;gap:7px}
    .sub-pick-btn{padding:6px 13px;border-radius:20px;border:1.5px solid var(--border);background:var(--card);font-size:.78rem;font-weight:600;cursor:pointer;color:var(--muted);font-family:inherit;transition:all .15s}
    .sub-pick-btn:hover{border-color:var(--primary);color:var(--primary)}
    .sub-pick-btn.sel{background:var(--primary);color:#fff;border-color:var(--primary)}

    /* Attachments */
    .attach-row{display:flex;gap:6px;margin-bottom:6px}
    .attach-row .finput{flex:1}
    .attachment-links{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
    .attach-link{font-size:.78rem;color:var(--primary);background:var(--pri-lite);border:1px solid #bfdbfe;border-radius:6px;padding:3px 10px;text-decoration:none;display:inline-flex;align-items:center;gap:4px;word-break:break-all}
    .attach-link:hover{background:#bfdbfe}

    /* Voice recorder */
    .voice-rec-ui{background:#f8f9fc;border:1.5px dashed var(--border);border-radius:8px;padding:12px;display:flex;flex-direction:column;gap:8px}
    .btn-mic{background:var(--card);border:1.5px solid var(--border);border-radius:8px;padding:8px 14px;font-size:.82rem;font-weight:600;cursor:pointer;display:inline-flex;align-items:center;gap:6px;color:var(--text);font-family:inherit;transition:all .15s}
    .btn-mic:hover:not(.recording){border-color:var(--primary);color:var(--primary)}
    .btn-mic.recording{background:#fee2e2;border-color:var(--danger);color:var(--danger)}
    .rec-timer{font-size:.78rem;font-weight:700;color:var(--danger);display:flex;align-items:center;gap:5px}
    .rec-dot{width:8px;height:8px;border-radius:50%;background:var(--danger);animation:rec-pulse .8s ease-in-out infinite alternate}
    .voice-preview-bar{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
    .voice-preview-bar audio{height:32px;flex:1;min-width:160px;max-width:280px}
    @keyframes rec-pulse{from{opacity:1}to{opacity:.2}}

    /* Voice player (in detail view) */
    .voice-player-wrap{margin:10px 0;padding:10px 12px;background:var(--pri-lite);border:1px solid #bfdbfe;border-radius:8px;display:inline-flex;flex-direction:column;gap:5px;max-width:340px;width:100%}
    .voice-label{font-size:.73rem;font-weight:700;color:var(--primary);display:flex;align-items:center;gap:5px}
    .voice-player-wrap audio{width:100%;height:32px}

    /* Inline links */
    .inline-link{color:var(--primary);word-break:break-all}
    .inline-link:hover{text-decoration:underline;color:var(--pri-dark)}

    /* Buttons */
    .btn-primary{background:var(--primary);color:#fff;border:none;border-radius:8px;padding:9px 18px;font-weight:700;font-size:.85rem;cursor:pointer;display:inline-flex;align-items:center;gap:6px;transition:background .15s;font-family:inherit}
    .btn-primary:hover{background:var(--pri-dark)}
    .btn-primary:disabled{opacity:.6;cursor:not-allowed}
    .btn-outline{background:transparent;color:var(--muted);border:1.5px solid var(--border);border-radius:8px;padding:9px 16px;font-weight:600;font-size:.85rem;cursor:pointer;font-family:inherit;transition:all .15s}
    .btn-outline:hover{border-color:var(--primary);color:var(--primary)}
    .btn-sm{padding:5px 11px!important;font-size:.78rem!important}
    .btn-row{display:flex;gap:10px;flex-wrap:wrap}
    .btn-back{background:none;border:1.5px solid var(--border);border-radius:8px;padding:7px 13px;font-size:.82rem;font-weight:600;color:var(--muted);cursor:pointer;display:inline-flex;align-items:center;gap:6px;margin-bottom:16px;font-family:inherit;transition:all .15s}
    .btn-back:hover{border-color:var(--primary);color:var(--primary)}

    /* Misc */
    .meta{font-size:.75rem;color:var(--muted)}
    .meta strong{color:#374151}
    .section-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
    .section-hdr h6{font-weight:800;font-size:.95rem;margin:0}
    .divider{border:none;border-top:1px solid var(--border);margin:18px 0}
    .ans-count{background:var(--pri-lite);color:var(--primary);font-size:.75rem;font-weight:700;border-radius:20px;padding:2px 10px}
    .err-msg{font-size:.78rem;color:var(--danger);margin-top:6px}
    .inline-edit{margin-top:8px}
    .inline-edit .btn-row{margin-top:8px}
    .empty{text-align:center;padding:48px 20px;color:var(--muted)}
    .empty i{font-size:2.5rem;display:block;margin-bottom:10px;color:#c7d2fe}
    .spinner{text-align:center;padding:40px;color:var(--muted)}
    @keyframes spin{to{transform:rotate(360deg)}}

    /* Modal */
    .modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:500;align-items:center;justify-content:center}
    .modal-bg.show{display:flex}
    .modal-box{background:var(--card);border-radius:14px;padding:28px;max-width:380px;width:92%;box-shadow:0 20px 60px rgba(0,0,0,.2);animation:popIn .15s ease}
    @keyframes popIn{from{transform:scale(.95);opacity:0}to{transform:scale(1);opacity:1}}
    .modal-box h6{font-weight:800;margin-bottom:6px}
    .modal-box p{font-size:.88rem;color:var(--muted);margin-bottom:20px}
    .btn-danger{background:var(--danger);color:#fff;border:none;border-radius:8px;padding:9px 18px;font-weight:700;font-size:.85rem;cursor:pointer;font-family:inherit}
    .btn-danger:hover{background:#b91c1c}

    /* Toasts */
    .toast-stack{position:fixed;bottom:24px;right:20px;z-index:999;display:flex;flex-direction:column;gap:8px;max-width:280px}
    .toast{background:#1f2937;color:#fff;padding:10px 16px;border-radius:8px;font-size:.82rem;font-weight:500;box-shadow:0 4px 16px rgba(0,0,0,.2);animation:slideUp .25s ease;word-break:break-word}
    .toast.ok{border-left:3px solid var(--success)}
    .toast.err{border-left:3px solid var(--danger)}
    @keyframes slideUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}

    @media(max-width:600px){.wrap{padding:14px 10px 60px}.form-box,.detail-box{padding:14px}.navbar{padding:0 12px}.comment-input-row .name-in{max-width:90px}}
  </style>
</head>
<body>

<!-- Confirm Modal -->
<div class="modal-bg" id="confirmModal">
  <div class="modal-box">
    <h6><i class="bi bi-exclamation-triangle" style="color:var(--danger)"></i> Confirm Delete</h6>
    <p id="confirmMsg">This action cannot be undone.</p>
    <div class="btn-row" style="justify-content:flex-end">
      <button class="btn-outline btn-sm" id="confirmCancel">Cancel</button>
      <button class="btn-danger btn-sm" id="confirmOk">Delete</button>
    </div>
  </div>
</div>

<div class="toast-stack" id="toastStack"></div>

<!-- Navbar -->
<nav class="navbar">
  <div class="nav-brand"><i class="bi bi-mortarboard-fill"></i> Sem<span>Overflow</span></div>
  <button class="btn-ask" id="btnAsk"><i class="bi bi-plus-lg"></i> Ask Question</button>
</nav>

<!-- Subject Tabs — order: All · General Doubts · Maths · COA · DBMS · OS · SE · SC · Ethics -->
<div class="subject-bar">
  <div class="sub-tab active"   data-sub="All">All</div>
  <div class="sub-tab"          data-sub="General">General Doubts</div>
  <div class="sub-tab"          data-sub="Maths">Maths</div>
  <div class="sub-tab"          data-sub="COA">COA</div>
  <div class="sub-tab"          data-sub="DBMS">DBMS</div>
  <div class="sub-tab"          data-sub="OS">OS</div>
  <div class="sub-tab"          data-sub="SE">Soft. Engg</div>
  <div class="sub-tab"          data-sub="SC">Soft Computing</div>
  <div class="sub-tab"          data-sub="Ethics">Ethics</div>
</div>

<div class="wrap">

  <!-- FEED -->
  <div id="secFeed" class="section active">
    <div class="feed-hdr"><h5 id="feedTitle">All Questions</h5></div>
    <div id="qList"><div class="spinner"><i class="bi bi-arrow-repeat" style="font-size:1.5rem;animation:spin 1s linear infinite;display:block;margin-bottom:8px"></i>Loading…</div></div>
  </div>

  <!-- ASK -->
  <div id="secAsk" class="section">
    <div class="form-box">
      <div class="form-title"><i class="bi bi-patch-question-fill" style="color:var(--primary)"></i> Post a Question</div>
      <div class="fgroup">
        <label class="flabel">Your Name *</label>
        <input type="text" id="qName" class="finput" placeholder="e.g. Rahul Menon" maxlength="60"/>
      </div>
      <div class="fgroup">
        <label class="flabel">Subject *</label>
        <!-- order mirrors tab bar; label "General Doubts" but value stays "General" to match Firestore -->
        <div class="sub-picker" id="subPicker">
          <button class="sub-pick-btn" data-sub="General">General Doubts</button>
          <button class="sub-pick-btn" data-sub="Maths">Maths</button>
          <button class="sub-pick-btn" data-sub="COA">COA</button>
          <button class="sub-pick-btn" data-sub="DBMS">DBMS</button>
          <button class="sub-pick-btn" data-sub="OS">OS</button>
          <button class="sub-pick-btn" data-sub="SE">Software Engineering</button>
          <button class="sub-pick-btn" data-sub="SC">Soft Computing</button>
          <button class="sub-pick-btn" data-sub="Ethics">Ethics</button>
        </div>
      </div>
      <div class="fgroup">
        <label class="flabel">Title *</label>
        <input type="text" id="qTitle" class="finput" placeholder="What's your doubt?" maxlength="150"/>
      </div>
      <div class="fgroup">
        <label class="flabel">Description * <span class="flabel-sub">(URLs are auto-linked)</span></label>
        <textarea id="qDesc" class="ftextarea" rows="5" placeholder="Explain in detail…"></textarea>
      </div>
      <div class="fgroup">
        <label class="flabel">Voice Message <span class="flabel-sub">optional · max 45s</span></label>
        <div id="qVoiceWrap"></div>
      </div>
      <div class="fgroup">
        <label class="flabel">Attachments <span class="flabel-sub">optional</span></label>
        <div id="qImgInputs"></div>
        <button type="button" class="act-btn primary" id="qAddImg" style="margin-top:4px"><i class="bi bi-link-45deg"></i> Add Link</button>
      </div>
      <div class="err-msg" id="qErr" style="display:none"></div>
      <div class="btn-row" style="margin-top:6px">
        <button class="btn-primary" id="btnPostQ"><i class="bi bi-send-fill"></i> Post Question</button>
        <button class="btn-outline" id="btnCancelQ">Cancel</button>
      </div>
    </div>
  </div>

  <!-- DETAIL -->
  <div id="secDetail" class="section">
    <button class="btn-back" id="btnBack"><i class="bi bi-arrow-left"></i> Back</button>
    <div class="detail-box" id="questionBox"></div>
    <div id="answerSection">
      <div class="section-hdr">
        <h6><span id="ansCount" class="ans-count">0</span>&nbsp; Answers</h6>
      </div>
      <div id="answerList"></div>
      <div class="form-box" style="margin-top:16px">
        <div class="form-title" style="font-size:.9rem"><i class="bi bi-reply-fill" style="color:var(--primary)"></i> Write an Answer</div>
        <div class="fgroup">
          <label class="flabel">Your Name *</label>
          <input type="text" id="aName" class="finput" placeholder="e.g. Priya Nair" maxlength="60"/>
        </div>
        <div class="fgroup">
          <label class="flabel">Answer * <span class="flabel-sub">(URLs are auto-linked)</span></label>
          <textarea id="aText" class="ftextarea" rows="4" placeholder="Type your answer…"></textarea>
        </div>
        <div class="fgroup">
          <label class="flabel">Voice Message <span class="flabel-sub">optional · max 45s</span></label>
          <div id="aVoiceWrap"></div>
        </div>
        <div class="fgroup">
          <label class="flabel">Attachments <span class="flabel-sub">optional</span></label>
          <div id="aImgInputs"></div>
          <button type="button" class="act-btn primary" id="aAddImg" style="margin-top:4px"><i class="bi bi-link-45deg"></i> Add Link</button>
        </div>
        <div class="err-msg" id="aErr" style="display:none"></div>
        <button class="btn-primary btn-sm" id="btnPostA" style="margin-top:4px"><i class="bi bi-send-fill"></i> Post Answer</button>
      </div>
    </div>
  </div>

</div>

<script type="module">
  // ── FIREBASE CONFIG ────────────────────────────────────────────────────────
  const firebaseConfig = {
    apiKey: "AIzaSyBrYJ_Kc2Pg1ozKDaJw1MRfAVFLUfumD9c",
    authDomain: "semoverflow.firebaseapp.com",
    projectId: "semoverflow",
    storageBucket: "semoverflow.firebasestorage.app",
    messagingSenderId: "822091379945",
    appId: "1:822091379945:web:c06556eb77103823af2c78"
  };

  // ── CLOUDINARY CONFIG ──────────────────────────────────────────────────────
  // 1. Go to cloudinary.com → sign up free
  // 2. Dashboard → Settings → Upload → Upload presets → Add preset
  //    Set "Signing mode" to "Unsigned"
  //    Set "Resource type" to "Auto" (so audio files upload correctly)
  // 3. Paste your Cloud Name and preset name below
  const CLOUDINARY_CLOUD_NAME  = "drrrzi9aj";   // e.g. "dxyz123abc"
  const CLOUDINARY_UPLOAD_PRESET = "semoverflowcloudinary"; // e.g. "semoverflow_voices"
  // NOTE: Deletion of voice files from Cloudinary is intentionally skipped
  // because client-side deletion requires the API secret (which must not be
  // exposed in browser code). Deleted questions/answers are removed from
  // Firestore fully; their orphaned audio files remain in Cloudinary but do
  // not count much against the generous 25 GB free storage limit.
  // ───────────────────────────────────────────────────────────────────────────

  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import {
    getFirestore, collection, addDoc, updateDoc, deleteDoc,
    query, orderBy, onSnapshot, where, serverTimestamp, doc, getDoc, getDocs
  } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

  // Firebase Storage is no longer imported — voices go to Cloudinary instead.

  const app = initializeApp(firebaseConfig);
  const db  = getFirestore(app);

  // ══════════════════════════════════════════════════════════════
  // HELPERS
  // ══════════════════════════════════════════════════════════════

  const san = str => { const d=document.createElement("div"); d.textContent=str||""; return d.innerHTML; };

  const linkify = text => san(text).replace(
    /(https?:\/\/[^\s<>"&]+)/g,

    if (!url) return "";

    return m ? `https://drive.google.com/uc?export=view&id=${m[1]}` : url;
  };

  const timeAgo = ts => {
    if (!ts) return "";
    const s = Math.floor((Date.now() - ts.toMillis()) / 1000);
    if (s <  60)   return `${s}s ago`;
    if (s < 3600)  return `${Math.floor(s/60)}m ago`;
    if (s < 86400) return `${Math.floor(s/3600)}h ago`;
    return `${Math.floor(s/86400)}d ago`;

  const initials = name => (name||"?").split(" ").map(w=>w[0]).join("").toUpperCase().slice(0,2);

  const subClass = s => ({
    Maths:"s-Maths", COA:"s-COA", DBMS:"s-DBMS", OS:"s-OS",

    setTimeout(()=>el.remove(), 3500);

  const showErr  = (id,msg) => { const e=document.getElementById(id); e.textContent=msg; e.style.display="block"; };
  const clearErr = id => { const e=document.getElementById(id); e.textContent=""; e.style.display="none"; };

  // ══════════════════════════════════════════════════════════════
  // CONFIRM DIALOG
  // ══════════════════════════════════════════════════════════════

  let _confirmCb = null;
  document.getElementById("confirmCancel").onclick = () => document.getElementById("confirmModal").classList.remove("show");
  document.getElementById("confirmOk").onclick     = () => { document.getElementById("confirmModal").classList.remove("show"); _confirmCb?.(); };

  // ══════════════════════════════════════════════════════════════
  // VOICE — CLOUDINARY UPLOAD
  // Replaces Firebase Storage. Uses unsigned upload preset so no
  // server / API secret is needed. Audio files count as "video"
  // resource type in Cloudinary's API (this is correct behaviour).
  // ══════════════════════════════════════════════════════════════

  /**
   * Upload a voice Blob to Cloudinary via unsigned upload preset.
   * Returns { url, publicId } — store both in Firestore.
   * `url`      → used for the <audio> player
   * `publicId` → stored as voicePath for reference (deletion not done client-side)
   */
  const uploadVoice = async (blob, mimeType) => {
    if (!CLOUDINARY_CLOUD_NAME || CLOUDINARY_CLOUD_NAME === "YOUR_CLOUD_NAME") {
      throw new Error("Cloudinary cloud name not configured. Open the HTML file and fill in CLOUDINARY_CLOUD_NAME and CLOUDINARY_UPLOAD_PRESET.");
    }

    const formData = new FormData();
    formData.append("file", blob);
    formData.append("upload_preset", CLOUDINARY_UPLOAD_PRESET);
    // resource_type=video handles all audio formats (webm, ogg, mp4) correctly
    const endpoint = `https://api.cloudinary.com/v1_1/${CLOUDINARY_CLOUD_NAME}/video/upload`;

    const res = await fetch(endpoint, { method: "POST", body: formData });
    if (!res.ok) {
      const err = await res.json().catch(()=>({}));
      throw new Error(err?.error?.message || `Cloudinary upload failed (${res.status})`);
    }
    const data = await res.json();
    return { url: data.secure_url, publicId: data.public_id };
  };

  /**
   * Cloudinary deletion from the browser would require the API secret,
   * which must never be exposed in client-side code. We therefore skip
   * deletion — the Firestore document is fully removed, but the audio
   * file remains in Cloudinary (orphaned). This is safe and stays well
   * within Cloudinary's free 25 GB limit for typical classroom usage.
   * To bulk-clean orphaned files: Cloudinary Dashboard → Media Library →
   * filter by folder "voices" → select all → delete.
   */
  const deleteVoice = async (_publicId) => {
    // intentionally no-op on the client side — see comment above
  };

  // ══════════════════════════════════════════════════════════════
  // VOICE RECORDER CLASS
  // Tries formats in priority order; falls back gracefully.
  // Priority: audio/webm;codecs=opus → audio/webm → audio/ogg;codecs=opus → audio/mp4
  // ══════════════════════════════════════════════════════════════

  class VoiceRecorder {
    constructor(cid) {
      this.cid    = cid;
      this.mr     = null; this.chunks = []; this.blob = null;
      this.tmr    = null; this.secs = 0; this.MAX = 45;
      // Determine the best supported MIME type in priority order
      this.mime = [
        "audio/webm;codecs=opus",   // best quality + compression (Chrome, Edge, Firefox)
        "audio/webm",               // Chrome/Edge fallback
        "audio/ogg;codecs=opus",    // Firefox fallback
        "audio/mp4"                 // Safari fallback
      ].find(t => {
        try { return MediaRecorder.isTypeSupported(t); }
        catch (e) { return false; }
      }) || "";
      this._init();
    }

    $(sel) { return document.getElementById(this.cid)?.querySelector(sel); }

    _init() {
      const c = document.getElementById(this.cid);
      if (!c) return;
      if (!window.MediaRecorder) {
        c.innerHTML = `<p class="meta" style="font-style:italic;color:var(--muted)">Voice recording is not supported in this browser. Try Chrome, Firefox, or Edge.</p>`;
        return;
      }
      c.innerHTML = `
        <div class="voice-rec-ui">
          <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap">
            <button type="button" class="btn-mic js-mic"><i class="bi bi-mic-fill"></i> Record (max 45s)</button>
            <span class="rec-timer hidden"><span class="rec-dot"></span> <span class="js-secs">0</span>s / 45s</span>
          </div>
          <div class="voice-preview-bar hidden js-preview">
            <audio controls preload="none" class="js-audio"></audio>
            <button type="button" class="act-btn js-rerecord" style="flex-shrink:0"><i class="bi bi-arrow-counterclockwise"></i> Re-record</button>
          </div>
        </div>`;
      this.$(".js-mic").onclick      = () => this.toggle();
      this.$(".js-rerecord").onclick = () => this.reset();
    }

    async toggle() { this.mr?.state === "recording" ? this.stop() : await this.start(); }

    async start() {
      let stream;
      try {
        // Request optimal audio constraints for voice
        stream = await navigator.mediaDevices.getUserMedia({
          audio: {
            sampleRate: 16000,
            channelCount: 1,
            echoCancellation: true,
            noiseSuppression: true,
            autoGainControl: true
          }
        });
      } catch (e) {
        // Fallback: request audio with no specific constraints
        try { stream = await navigator.mediaDevices.getUserMedia({ audio: true }); }
        catch (e2) { toast("Microphone access denied. Please allow mic permission.", "err"); return; }
      }

      const opts = { audioBitsPerSecond: 16000 };
      if (this.mime) opts.mimeType = this.mime;

      try {
        this.mr = new MediaRecorder(stream, opts);
      } catch (e) {
        // If the chosen mime type fails at construction time, try without specifying it
        try { this.mr = new MediaRecorder(stream); }
        catch (e2) { toast("Could not start recording on this browser.", "err"); stream.getTracks().forEach(t=>t.stop()); return; }
      }

      this.chunks = [];
      this.mr.ondataavailable = e => { if (e.data.size > 0) this.chunks.push(e.data); };
      this.mr.onstop = () => this._onStop(stream);
      this.mr.start(250);

      this.secs = 0;
      this.$(".js-secs").textContent = "0";
      this.$(".rec-timer")?.classList.remove("hidden");
      this.$(".js-mic").innerHTML = `<i class="bi bi-stop-fill"></i> Stop`;
      this.$(".js-mic").classList.add("recording");
      this.tmr = setInterval(() => {
        this.secs++;
        this.$(".js-secs").textContent = this.secs;
        if (this.secs >= this.MAX) this.stop();
      }, 1000);
    }

    stop() {
      clearInterval(this.tmr);
      if (this.mr?.state !== "inactive") this.mr?.stop();
    }

    _onStop(stream) {
      stream.getTracks().forEach(t => t.stop());
      // Use the actual mimeType the MediaRecorder settled on (important for fallback paths)
      const type = (this.mr?.mimeType && this.mr.mimeType !== "") ? this.mr.mimeType : (this.mime || "audio/webm");
      this.blob = new Blob(this.chunks, { type });
      const a = this.$(".js-audio");
      if (a) a.src = URL.createObjectURL(this.blob);
      this.$(".js-preview")?.classList.remove("hidden");
      this.$(".rec-timer")?.classList.add("hidden");
      const mic = this.$(".js-mic");
      if (mic) { mic.innerHTML = `<i class="bi bi-mic-fill"></i> Re-record`; mic.classList.remove("recording"); }
    }

    reset() {
      clearInterval(this.tmr);
      try { if (this.mr?.state !== "inactive") { this.mr.onstop = null; this.mr.stop(); } } catch (e) {}
      this.blob = null;
      const c = document.getElementById(this.cid);
      if (!c) return;
      const a = c.querySelector(".js-audio");
      if (a) a.src = "";
      c.querySelector(".js-preview")?.classList.add("hidden");
      c.querySelector(".rec-timer")?.classList.add("hidden");
      const mic = c.querySelector(".js-mic");
      if (mic) { mic.innerHTML = `<i class="bi bi-mic-fill"></i> Record (max 45s)`; mic.classList.remove("recording"); }
    }

    getBlob()     { return this.blob; }
    getMimeType() { return (this.mr?.mimeType && this.mr.mimeType !== "") ? this.mr.mimeType : (this.mime || "audio/webm"); }
  }

  // ══════════════════════════════════════════════════════════════
  // ATTACHMENT HELPERS
  // ══════════════════════════════════════════════════════════════

  const addImgInput = cid => {
    const c = document.getElementById(cid);
    const n = c.children.length + 1;
    const d = document.createElement("div");
    d.className = "attach-row";
    d.innerHTML = `<input type="text" class="finput img-label" placeholder="Label ${n}" style="max-width:130px;flex-shrink:0">

    document.querySelectorAll(`#${cid} .attach-row`).forEach((r, i) => {
      const label = r.querySelector(".img-label").value.trim() || `Attachment ${i+1}`;

    return `<div class="attachment-links">${links.map(l =>

  const renderVoice = url => {
    if (!url) return "";
    return `<div class="voice-player-wrap">

  // ══════════════════════════════════════════════════════════════

  // ══════════════════════════════════════════════════════════════

  const showSec = id => ["secFeed","secAsk","secDetail"].forEach(s =>
    document.getElementById(s).classList.toggle("active", s === id)
  );

  // ══════════════════════════════════════════════════════════════
  // HASH ROUTING
  // Format:  #SubjectName            → subject feed
  //          #SubjectName/questionId → question detail
  // ══════════════════════════════════════════════════════════════

  const SUBS = ["All","General","Maths","COA","DBMS","OS","SE","SC","Ethics"];
  let _skipHash = false;

  const setHash = (sub, qid=null) => {
    _skipHash = true;
    window.location.hash = qid ? `${encodeURIComponent(sub)}/${qid}` : encodeURIComponent(sub);
    setTimeout(() => _skipHash = false, 60);
  };

  const readHash = () => {
    const raw = decodeURIComponent(window.location.hash.slice(1));
    if (!raw) { activeSub = "All"; loadFeed(); showSec("secFeed"); return; }
    const [sub, qid] = raw.split("/");
    if (sub && SUBS.includes(sub)) {
      activeSub = sub;
      document.querySelectorAll(".sub-tab").forEach(t => t.classList.toggle("active", t.dataset.sub === sub));
      document.getElementById("feedTitle").textContent = feedTitle(sub);
    }
    loadFeed();
    if (qid) openQuestion(qid); else showSec("secFeed");
  };

  window.addEventListener("hashchange", () => { if (!_skipHash) readHash(); });

  // ══════════════════════════════════════════════════════════════
  // SUBJECT TABS
  // ══════════════════════════════════════════════════════════════

  let activeSub = "All", postSub = null;

  const feedTitle = sub => {
    if (sub === "All")     return "All Questions";
    if (sub === "General") return "General Doubts — Questions";
    return `${sub} — Questions`;
  };

  document.querySelectorAll(".sub-tab").forEach(t => t.addEventListener("click", () => {
    document.querySelectorAll(".sub-tab").forEach(x => x.classList.remove("active"));
    t.classList.add("active");
    activeSub = t.dataset.sub;
    document.getElementById("feedTitle").textContent = feedTitle(activeSub);
    setHash(activeSub);
    loadFeed();
    showSec("secFeed");
  }));

  document.querySelectorAll(".sub-pick-btn").forEach(b => b.addEventListener("click", () => {
    document.querySelectorAll(".sub-pick-btn").forEach(x => x.classList.remove("sel"));
    b.classList.add("sel"); postSub = b.dataset.sub;
  }));

  // ══════════════════════════════════════════════════════════════
  // FEED
  // ══════════════════════════════════════════════════════════════

  let unsubFeed = null, unsubAllAns = null;

  function loadFeed() {
    unsubFeed?.(); unsubAllAns?.();
    const qList = document.getElementById("qList");
    qList.innerHTML = `<div class="spinner"><i class="bi bi-arrow-repeat" style="font-size:1.5rem;animation:spin 1s linear infinite;display:block;margin-bottom:8px"></i>Loading…</div>`;

    const q = activeSub === "All"
      ? query(collection(db, "questions"), orderBy("createdAt", "desc"))
      : query(collection(db, "questions"), where("subject", "==", activeSub));

    let qDocs = [];
    const countMap = {};

    unsubFeed = onSnapshot(q, snap => {
      qDocs = snap.docs;
      if (activeSub !== "All")
        qDocs = [...qDocs].sort((a,b) => (b.data().createdAt?.toMillis()||0) - (a.data().createdAt?.toMillis()||0));
      if (!qDocs.length) {
        qList.innerHTML = `<div class="empty"><i class="bi bi-chat-square-dots"></i><p>No questions here yet.<br>Be the first to ask!</p></div>`;
        return;
      }
      qDocs.forEach(d => { if (!countMap[d.id]) countMap[d.id] = 0; });
      unsubAllAns?.();
      unsubAllAns = onSnapshot(query(collection(db, "answers")), aSnap => {
        qDocs.forEach(d => countMap[d.id] = 0);
        aSnap.forEach(a => { if (countMap[a.data().questionId] !== undefined) countMap[a.data().questionId]++; });
        renderFeed(qDocs, countMap);
      });
    });
  }

  function renderFeed(docs, countMap) {
    const qList = document.getElementById("qList");
    qList.innerHTML = docs.map(d => {
      const q = d.data(), cnt = countMap[d.id] ?? 0;
      return `<div class="q-card" data-id="${d.id}">
        <div class="q-card-title">${san(q.title)}</div>
        <div class="q-card-desc">${san(q.description)}</div>
        <div class="q-card-meta">
          ${subBadge(q.subject)}
          <span class="badge badge-ans"><i class="bi bi-chat-left-text"></i>&nbsp;${cnt} answer${cnt!==1?"s":""}</span>
          ${q.voiceUrl ? `<span class="badge badge-voice"><i class="bi bi-mic-fill"></i>&nbsp;Voice</span>` : ""}
          <span class="meta">by <strong>${san(q.name||"Anonymous")}</strong> · ${timeAgo(q.createdAt)}</span>
        </div>
      </div>`;
    }).join("");
    qList.querySelectorAll(".q-card").forEach(c => c.addEventListener("click", () => {
      setHash(activeSub, c.dataset.id);
      openQuestion(c.dataset.id);
    }));
  }

  // ══════════════════════════════════════════════════════════════

  let qRecorder = null;

  document.getElementById("btnAsk").addEventListener("click", () => {
    clearErr("qErr");

      document.querySelectorAll(".sub-pick-btn").forEach(b => b.classList.toggle("sel", b.dataset.sub === activeSub));
      postSub = activeSub;

      document.querySelectorAll(".sub-pick-btn").forEach(b => b.classList.remove("sel"));

  });

  document.getElementById("btnCancelQ").addEventListener("click", () => {
    qRecorder?.reset();
    setHash(activeSub);
    showSec("secFeed");
  });

  document.getElementById("qAddImg").addEventListener("click", () => addImgInput("qImgInputs"));

  document.getElementById("btnPostQ").addEventListener("click", async () => {
    const name  = document.getElementById("qName").value.trim();
    const title = document.getElementById("qTitle").value.trim();
    const desc  = document.getElementById("qDesc").value.trim();
    const imgs  = collectImgs("qImgInputs");
    clearErr("qErr");
    if (!name)    return showErr("qErr", "Please enter your name.");
    if (!postSub) return showErr("qErr", "Please select a subject.");
    if (!title)   return showErr("qErr", "Please enter a title.");
    if (!desc)    return showErr("qErr", "Please describe your doubt.");

    const btn = document.getElementById("btnPostQ");
    btn.disabled = true; btn.innerHTML = "Posting…";
    try {
      let voiceUrl = null, voicePath = null;
      const vBlob = qRecorder?.getBlob();
      if (vBlob) {
        toast("Uploading voice…");
        const v = await uploadVoice(vBlob, qRecorder.getMimeType());
        voiceUrl  = v.url;
        voicePath = v.publicId; // stored for reference (not used for deletion client-side)
      }
      await addDoc(collection(db, "questions"), {
        name, title, description: desc, subject: postSub,
        imageLinks: imgs, voiceUrl, voicePath,
        createdAt: serverTimestamp()
      });
      ["qName","qTitle","qDesc"].forEach(id => document.getElementById(id).value = "");
      document.getElementById("qImgInputs").innerHTML = "";
      document.querySelectorAll(".sub-pick-btn").forEach(b => b.classList.remove("sel")); postSub = null;
      qRecorder?.reset();
      toast("Question posted!");
      setHash(activeSub); loadFeed(); showSec("secFeed");
    } catch (e) {
      showErr("qErr", e.message); toast("Failed to post", "err");
    } finally {
      btn.disabled = false; btn.innerHTML = '<i class="bi bi-send-fill"></i> Post Question';
    }
  });

  // ══════════════════════════════════════════════════════════════
  // DETAIL
  // ══════════════════════════════════════════════════════════════

  let unsubAnswers = null, unsubComments = null, curQid = null, allComments = [], aRecorder = null;

  async function openQuestion(id) {
    curQid = id;
    showSec("secDetail");
    clearErr("aErr");
    document.getElementById("aName").value = "";
    document.getElementById("aText").value = "";
    document.getElementById("aImgInputs").innerHTML = "";
    addImgInput("aImgInputs");
    aRecorder?.reset();
    aRecorder = new VoiceRecorder("aVoiceWrap");
    document.getElementById("questionBox").innerHTML = `<div class="spinner">Loading…</div>`;
    document.getElementById("answerList").innerHTML  = "";
    document.getElementById("ansCount").textContent  = "0";

    const qSnap = await getDoc(doc(db, "questions", id)).catch(() => null);
    if (!qSnap?.exists()) {
      document.getElementById("questionBox").innerHTML = `<p style="color:var(--danger)">Question not found.</p>`;
      return;
    }
    renderQuestion(qSnap);

    unsubComments?.();
    unsubComments = onSnapshot(
      query(collection(db, "comments"), where("questionId", "==", id)),
      snap => {
        allComments = snap.docs
          .map(d => ({ id: d.id, ...d.data() }))
          .sort((a,b) => (a.createdAt?.toMillis()||0) - (b.createdAt?.toMillis()||0));

        document.querySelectorAll(".answer-block").forEach(b => {
          const area = b.querySelector(".ans-comm-list");
          if (area) renderComments(area, b.dataset.aid, null);
        });
      }
    );

    unsubAnswers?.();
    unsubAnswers = onSnapshot(
      query(collection(db, "answers"), where("questionId", "==", id)),
      snap => {
        const sorted = [...snap.docs].sort((a,b) => (a.data().createdAt?.toMillis()||0) - (b.data().createdAt?.toMillis()||0));
        document.getElementById("ansCount").textContent = snap.size;
        renderAnswers(sorted);
      }
    );
  }

  // ── Render Question ────────────────────────────────────────────

  function renderQuestion(qSnap) {

      <hr class="divider"/>

        </div>
        <div id="qCommentList" class="comment-list"></div>
      </div>`;

    document.getElementById("qShareBtn").onclick = async () => {
      try { await navigator.clipboard.writeText(shareUrl); toast("Link copied!"); }
      catch (e) { prompt("Copy this link:", shareUrl); }
    };

    document.getElementById("qEditBtn").onclick    = () => { document.getElementById("qBodyText").style.display="none"; document.getElementById("qBodyEdit").style.display="block"; };
    document.getElementById("qEditCancel").onclick = () => { document.getElementById("qBodyText").style.display="block"; document.getElementById("qBodyEdit").style.display="none"; };
    document.getElementById("qEditSave").onclick   = async () => {
      const t = document.getElementById("qEditInput").value.trim();
      if (!t) return;
      await updateDoc(doc(db, "questions", id), { description: t, edited: true });
      document.getElementById("qBodyText").innerHTML = linkify(t);
      document.getElementById("qBodyText").style.display = "block";
      document.getElementById("qBodyEdit").style.display = "none";
      toast("Updated.");
    };

    // Delete question (cascade: answers + comments; voicePath logged but not deleted from Cloudinary)
    document.getElementById("qDelBtn").onclick = () => confirmDel(
      "Delete this question? All answers and comments will also be deleted.",
      async () => {
        const [aSnap, cSnap] = await Promise.all([
          getDocs(query(collection(db, "answers"),  where("questionId", "==", id))),
          getDocs(query(collection(db, "comments"), where("questionId", "==", id)))
        ]);
        await Promise.all([
          // deleteVoice is a no-op client-side; Firestore records are fully removed
          ...aSnap.docs.map(async a => { await deleteVoice(a.data().voicePath); return deleteDoc(a.ref); }),
          ...cSnap.docs.map(c => deleteDoc(c.ref))
        ]);
        await deleteVoice(d.voicePath);
        await deleteDoc(doc(db, "questions", id));
        toast("Question deleted.");
        unsubAnswers?.(); unsubComments?.();
        setHash(activeSub); showSec("secFeed");
      }
    );

    document.getElementById("qAddCommBtn").onclick = () => {
      const a = document.getElementById("qCommInput");
      a.style.display = a.style.display === "none" ? "block" : "none";
    };
    document.getElementById("qCommSubmit").onclick = async () => {
      const name = document.getElementById("qCommName").value.trim();
      const text = document.getElementById("qCommText").value.trim();
      if (!name || !text) return;
      await addDoc(collection(db, "comments"), { questionId: id, answerId: null, parentId: null, name, text, createdAt: serverTimestamp() });
      document.getElementById("qCommName").value = "";
      document.getElementById("qCommText").value = "";
      document.getElementById("qCommInput").style.display = "none";
    };
  }

  // ══════════════════════════════════════════════════════════════
  // COMMENTS (nested, Reddit-style)
  // ══════════════════════════════════════════════════════════════

  const getChildren = (parentId, answerId) =>
    allComments.filter(c => c.parentId === parentId && c.answerId === answerId);

  function renderComments(container, answerId, parentId, depth=0) {
    if (!container) return;
    const children = getChildren(parentId, answerId);
    if (depth === 0) container.innerHTML = "";
    children.forEach(c => {
      const wrap = document.createElement("div");
      wrap.innerHTML = `
        <div class="comment-item">
          <div class="comment-avatar">${initials(c.name)}</div>
          <div class="comment-bubble">
            <div class="comment-content">
              <strong>${san(c.name||"Anon")}</strong>
              <span> ${linkify(c.text)}</span>
              ${c.edited ? `<span class="edited-tag"> (edited)</span>` : ""}
            </div>
            <div class="comment-meta">
              <span>${timeAgo(c.createdAt)}</span>
              <button class="inline-btn js-rtog">Reply</button>
              <button class="inline-btn admin-only js-etog"><i class="bi bi-pencil"></i> Edit</button>
              <button class="inline-btn danger admin-only js-cdel"><i class="bi bi-trash3"></i></button>
            </div>
            <div class="js-rinput" style="display:none;margin-top:4px">
              <div class="comment-input-row">
                <input type="text" class="name-in js-rname" placeholder="Your name">
                <input type="text" class="js-rtext" placeholder="Reply… (URLs auto-link)">
                <button class="btn-primary btn-sm js-rsub">Post</button>
              </div>
            </div>
            <div class="js-einput" style="display:none;margin-top:4px">
              <div class="comment-input-row">
                <input type="text" class="js-etext" style="flex:1" value="${san(c.text)}">
                <button class="btn-primary btn-sm js-esave">Save</button>
                <button class="btn-outline btn-sm js-ecancel">×</button>
              </div>
            </div>
            <div class="reply-thread js-replies"></div>
          </div>
        </div>`;

      wrap.querySelector(".js-rtog").onclick  = () => { const r=wrap.querySelector(".js-rinput"); r.style.display=r.style.display==="none"?"block":"none"; };
      wrap.querySelector(".js-rsub").onclick  = async () => {
        const name = wrap.querySelector(".js-rname").value.trim();
        const text = wrap.querySelector(".js-rtext").value.trim();
        if (!name || !text) return;
        await addDoc(collection(db, "comments"), { questionId: curQid, answerId: c.answerId, parentId: c.id, name, text, createdAt: serverTimestamp() });
        wrap.querySelector(".js-rinput").style.display = "none";
      };
      wrap.querySelector(".js-etog").onclick   = () => wrap.querySelector(".js-einput").style.display = "block";
      wrap.querySelector(".js-ecancel").onclick = () => wrap.querySelector(".js-einput").style.display = "none";
      wrap.querySelector(".js-esave").onclick   = async () => {
        const t = wrap.querySelector(".js-etext").value.trim();
        if (!t) return;
        await updateDoc(doc(db, "comments", c.id), { text: t, edited: true });
        toast("Comment updated.");
      };
      wrap.querySelector(".js-cdel").onclick = () => confirmDel("Delete this comment and all its replies?", async () => {
        const toDelete = [c.id];
        const collect = pid => allComments.filter(x => x.parentId === pid).forEach(x => { toDelete.push(x.id); collect(x.id); });
        collect(c.id);
        await Promise.all(toDelete.map(cid => deleteDoc(doc(db, "comments", cid))));
        toast("Comment deleted.");
      });

      container.appendChild(wrap);
      if (depth < 5) renderComments(wrap.querySelector(".js-replies"), answerId, c.id, depth+1);
    });
  }

  // ══════════════════════════════════════════════════════════════
  // RENDER ANSWERS
  // ══════════════════════════════════════════════════════════════

  function renderAnswers(docs) {
    const list = document.getElementById("answerList");
    if (!docs.length) {
      list.innerHTML = `<div class="empty" style="padding:24px 0"><i class="bi bi-chat-right-dots" style="font-size:2rem;display:block;margin-bottom:8px;color:#c7d2fe"></i><p class="meta">No answers yet — be the first!</p></div>`;
      return;
    }
    list.innerHTML = docs.map(d => {
      const a = d.data();
      return `<div class="answer-block" data-aid="${d.id}">
        <div class="answer-body js-abody">${linkify(a.text)}</div>
        <div class="inline-edit js-aedit" style="display:none">
          <textarea class="ftextarea js-ainp" rows="3">${san(a.text)}</textarea>
          <div class="btn-row" style="margin-top:6px">
            <button class="btn-primary btn-sm js-asave">Save</button>
            <button class="btn-outline btn-sm js-acancel">Cancel</button>
          </div>
        </div>
        ${renderVoice(a.voiceUrl)}
        ${renderAttachments(a.imageLinks)}
        <div class="meta" style="margin-top:8px">by <strong>${san(a.name||"Anonymous")}</strong> · ${timeAgo(a.createdAt)}${a.edited?` <span class="edited-tag">· edited</span>`:""}</div>
        <div class="action-row">
          <button class="act-btn admin-only js-aedit-btn"><i class="bi bi-pencil"></i> Edit</button>
          <button class="act-btn danger admin-only js-adel-btn"><i class="bi bi-trash3"></i> Delete</button>
        </div>
        <hr class="divider" style="margin:12px 0"/>
        <div class="comment-section">
          <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">
            <span style="font-size:.78rem;font-weight:700;color:var(--muted)">COMMENTS</span>
            <button class="act-btn primary js-actog"><i class="bi bi-chat-left-text"></i> Add Comment</button>
          </div>
          <div class="js-acinput" style="display:none;margin-bottom:6px">
            <div class="comment-input-row">
              <input type="text" class="name-in js-acname" placeholder="Your name">
              <input type="text" class="js-actext" placeholder="Comment… (URLs auto-link)">
              <button class="btn-primary btn-sm js-acsub">Post</button>
            </div>
          </div>
          <div class="ans-comm-list comment-list"></div>
        </div>
      </div>`;
    }).join("");

    docs.forEach(d => {
      const id = d.id, a = d.data();
      const bl = list.querySelector(`.answer-block[data-aid="${id}"]`);
      bl.querySelector(".js-aedit-btn").onclick = () => { bl.querySelector(".js-abody").style.display="none"; bl.querySelector(".js-aedit").style.display="block"; };
      bl.querySelector(".js-acancel").onclick   = () => { bl.querySelector(".js-abody").style.display="block"; bl.querySelector(".js-aedit").style.display="none"; };
      bl.querySelector(".js-asave").onclick     = async () => {
        const t = bl.querySelector(".js-ainp").value.trim();
        if (!t) return;
        await updateDoc(doc(db, "answers", id), { text: t, edited: true });
        bl.querySelector(".js-abody").innerHTML = linkify(t);
        bl.querySelector(".js-abody").style.display = "block";
        bl.querySelector(".js-aedit").style.display = "none";
        toast("Answer updated.");
      };
      bl.querySelector(".js-adel-btn").onclick = () => confirmDel("Delete this answer and its comments?", async () => {
        const cSnap = await getDocs(query(collection(db, "comments"), where("answerId", "==", id)));
        await Promise.all(cSnap.docs.map(c => deleteDoc(c.ref)));
        await deleteVoice(a.voicePath); // no-op client-side; Firestore record cleaned up
        await deleteDoc(doc(db, "answers", id));
        toast("Answer deleted.");
      });
      bl.querySelector(".js-actog").onclick = () => { const ci=bl.querySelector(".js-acinput"); ci.style.display=ci.style.display==="none"?"block":"none"; };
      bl.querySelector(".js-acsub").onclick = async () => {
        const name = bl.querySelector(".js-acname").value.trim();
        const text = bl.querySelector(".js-actext").value.trim();
        if (!name || !text) return;
        await addDoc(collection(db, "comments"), { questionId: curQid, answerId: id, parentId: null, name, text, createdAt: serverTimestamp() });
        bl.querySelector(".js-acname").value = "";
        bl.querySelector(".js-actext").value = "";
        bl.querySelector(".js-acinput").style.display = "none";
      };
      renderComments(bl.querySelector(".ans-comm-list"), id, null);
    });
  }

  // ══════════════════════════════════════════════════════════════
  // POST ANSWER
  // ══════════════════════════════════════════════════════════════

  document.getElementById("aAddImg").addEventListener("click",  () => addImgInput("aImgInputs"));
  document.getElementById("btnPostA").addEventListener("click", async () => {
    const name = document.getElementById("aName").value.trim();
    const text = document.getElementById("aText").value.trim();
    const imgs = collectImgs("aImgInputs");
    clearErr("aErr");
    if (!name) return showErr("aErr", "Please enter your name.");
    if (!text) return showErr("aErr", "Please write an answer.");

    const btn = document.getElementById("btnPostA");
    btn.disabled = true; btn.textContent = "Posting…";
    try {
      let voiceUrl = null, voicePath = null;
      const vBlob = aRecorder?.getBlob();
      if (vBlob) {
        toast("Uploading voice…");
        const v = await uploadVoice(vBlob, aRecorder.getMimeType());
        voiceUrl  = v.url;
        voicePath = v.publicId;
      }
      await addDoc(collection(db, "answers"), {
        questionId: curQid, name, text,
        imageLinks: imgs, voiceUrl, voicePath,
        createdAt: serverTimestamp()
      });
      document.getElementById("aName").value = "";
      document.getElementById("aText").value = "";
      document.getElementById("aImgInputs").innerHTML = "";
      addImgInput("aImgInputs");
      aRecorder?.reset();
      toast("Answer posted!");
    } catch (e) {
      showErr("aErr", e.message); toast("Failed", "err");
    } finally {
      btn.disabled = false; btn.innerHTML = '<i class="bi bi-send-fill"></i> Post Answer';
    }
  });

  // ══════════════════════════════════════════════════════════════
  // BACK BUTTON
  // ══════════════════════════════════════════════════════════════

  document.getElementById("btnBack").addEventListener("click", () => {
    unsubAnswers?.(); unsubComments?.();
    unsubAnswers = null; unsubComments = null; curQid = null; allComments = [];
    aRecorder?.reset(); aRecorder = null;
    setHash(activeSub); showSec("secFeed");
  });

  // ══════════════════════════════════════════════════════════════
  // INIT
  // ══════════════════════════════════════════════════════════════

  addImgInput("qImgInputs");
  addImgInput("aImgInputs");
  readHash();
</script>
</body>
</html>
